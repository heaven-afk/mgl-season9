<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add MGL Season 9 to Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #7289da44;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 40px #7289da22;
    }

    .logo { font-size: 48px; margin-bottom: 12px; }

    h1 { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 6px; }

    .subtitle { font-size: 0.9rem; color: #aaa; margin-bottom: 28px; }

    .events {
      background: #0d0d1a;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 28px;
      text-align: left;
    }

    .event {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #ffffff10;
    }

    .event:last-child { border-bottom: none; }

    .event-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7289da;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .event-name { font-size: 0.85rem; font-weight: 600; color: #fff; }
    .event-date { font-size: 0.75rem; color: #888; margin-top: 2px; }

    .divider {
      font-size: 0.75rem;
      color: #555;
      margin: 6px 0 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      background: #7289da;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 10px;
    }

    .btn:hover { background: #5f73bc; }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px;
      background: transparent;
